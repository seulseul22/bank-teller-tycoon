<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>은행원 키우기 타이쿤</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Galmuri11&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#2a2040;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Galmuri11','Malgun Gothic',monospace;image-rendering:pixelated;overflow:hidden;}
  #game-container{width:480px;height:720px;position:relative;overflow:hidden;border:4px solid #6a5acd;border-radius:8px;box-shadow:0 0 30px rgba(106,90,205,0.4);}
  #title-screen{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:absolute;top:0;left:0;z-index:100;overflow:hidden;}
  .title-bg{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#B8E8FF 0%,#E8F4FF 40%,#FFF5E8 60%,#FFECD2 75%,#A8D8A8 75%,#7BC87B 85%,#5AA85A 100%);z-index:0;}
  .title-cloud{position:absolute;background:#fff;border-radius:50%;opacity:0.7;z-index:1;animation:cloud-drift linear infinite;}
  @keyframes cloud-drift{0%{transform:translateX(-100px);}100%{transform:translateX(580px);}}
  .title-bank{position:relative;z-index:3;width:240px;height:180px;margin-bottom:12px;}
  .bank-main{position:absolute;bottom:0;left:20px;right:20px;height:140px;background:linear-gradient(180deg,#FFF5E8,#FFE8D0);border:3px solid #D4A574;border-radius:8px 8px 0 0;box-shadow:2px 2px 0 #C49464;}
  .bank-roof{position:absolute;top:0;left:0;right:0;height:40px;background:linear-gradient(180deg,#FF9A9A,#FF7B7B);border:3px solid #D46A6A;border-radius:10px 10px 0 0;}
  .bank-sign{position:absolute;top:44px;left:50%;transform:translateX(-50%);background:#FFD700;border:2px solid #DAA520;padding:3px 12px;border-radius:4px;font-size:13px;color:#8B4513;font-weight:bold;box-shadow:1px 1px 0 #B8860B;white-space:nowrap;}
  .bank-window-cute{position:absolute;width:28px;height:32px;background:linear-gradient(180deg,#B8E8FF,#87CEEB);border:3px solid #D4A574;border-radius:4px 4px 0 0;}
  .bank-window-cute::after{content:'';position:absolute;top:50%;left:0;right:0;height:2px;background:#D4A574;}
  .bank-door-cute{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:44px;height:55px;background:linear-gradient(180deg,#C48040,#A06830);border:3px solid #8B5E30;border-radius:6px 6px 0 0;}
  .bank-door-cute::after{content:'';position:absolute;top:20px;right:8px;width:6px;height:6px;background:#FFD700;border-radius:50%;}
  .title-chars{position:relative;z-index:4;display:flex;gap:20px;margin-top:-15px;margin-bottom:10px;}
  #title-screen h1{position:relative;z-index:5;font-size:26px;color:#5A3A1A;text-shadow:2px 2px 0 #FFE0A0,-1px -1px 0 #FFF;text-align:center;line-height:1.4;margin-bottom:2px;}
  #title-screen .subtitle{position:relative;z-index:5;font-size:13px;color:#8B6B4A;margin-bottom:28px;letter-spacing:3px;}
  .pixel-btn{position:relative;z-index:5;padding:12px 40px;font-family:'Galmuri11','Malgun Gothic',monospace;font-size:16px;font-weight:bold;background:linear-gradient(180deg,#FF9A9A,#FF7B7B);color:#fff;border:none;border-radius:8px;border-bottom:4px solid #D46A6A;cursor:pointer;text-shadow:1px 1px 0 #C05050;letter-spacing:2px;transition:transform 0.1s;}
  .pixel-btn:hover{background:linear-gradient(180deg,#FFB0B0,#FF9090);transform:translateY(-1px);}
  .pixel-btn:active{border-bottom:2px solid #D46A6A;transform:translateY(2px);}
  .pixel-btn-green{background:linear-gradient(180deg,#7BD47B,#5ABF5A);border-bottom:4px solid #3A9A3A;text-shadow:1px 1px 0 #2A7A2A;}
  .pixel-btn-green:hover{background:linear-gradient(180deg,#90E090,#70D070);}
  .star{position:absolute;z-index:2;animation:twinkle 2s infinite alternate;}
  @keyframes twinkle{0%{opacity:0.3;transform:scale(0.8);}100%{opacity:1;transform:scale(1.2);}}
  #char-select{width:100%;height:100%;display:none;flex-direction:column;align-items:center;background:linear-gradient(180deg,#FFF5F5,#FFE8F0,#FFF0E8);position:absolute;top:0;left:0;z-index:90;padding-top:40px;}
  #char-select h2{font-size:20px;color:#5A3A3A;margin-bottom:24px;}
  .char-options{display:flex;gap:24px;margin-bottom:24px;}
  .char-card{width:175px;padding:16px 10px 14px;background:#fff;border:3px solid #E0C8E0;border-radius:12px;cursor:pointer;text-align:center;transition:transform 0.15s,border-color 0.2s,box-shadow 0.2s;box-shadow:2px 2px 0 #E8D8E8;}
  .char-card:hover{transform:scale(1.04);border-color:#FFB0C0;}
  .char-card.selected{border-color:#FF7B9A;background:#FFF5F8;box-shadow:0 0 16px rgba(255,120,160,0.3);}
  .char-card h3{font-size:18px;color:#5A3A4A;margin-top:8px;}
  .char-card p{font-size:11px;color:#999;margin-top:4px;line-height:1.5;}
  .char-card .char-stat{font-size:10px;color:#B080A0;margin-top:6px;}
  #game-screen{width:100%;height:100%;display:none;position:absolute;top:0;left:0;z-index:80;flex-direction:column;}
  #hud{height:70px;background:linear-gradient(180deg,#3A2860,#2A1840);border-bottom:3px solid #6A5ACD;display:flex;align-items:center;padding:0 6px;gap:5px;flex-shrink:0;}
  .hud-item{display:flex;flex-direction:column;align-items:center;padding:3px 5px;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);border-radius:6px;min-width:48px;}
  .hud-label{font-size:8px;color:#B0A0D0;}
  .hud-value{font-size:11px;color:#FFD700;font-weight:bold;}
  #time-bar-container{flex:1;height:20px;background:#1A1030;border:2px solid #6A5ACD;border-radius:4px;position:relative;overflow:hidden;}
  #time-bar{height:100%;width:100%;background:linear-gradient(90deg,#FFB347,#FFD700);transition:width 0.5s;border-radius:2px;}
  #time-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:10px;color:#fff;text-shadow:1px 1px 0 #000;font-weight:bold;}
  #bank-interior{flex:1;position:relative;overflow:hidden;background:linear-gradient(180deg,#FFF8F0,#FFF0E0);}
  #sky-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;transition:background 2s;z-index:1;}
  #queue-strip{position:absolute;top:0;left:0;right:0;height:100px;background:linear-gradient(180deg,#FFE8D0,#FFF0E0);border-bottom:3px solid #E8C8A0;z-index:10;display:flex;align-items:flex-end;padding:0 8px 6px;overflow:hidden;}
  #queue-label{position:absolute;top:4px;left:10px;font-size:10px;color:#8A6A4A;background:rgba(255,255,255,0.6);padding:2px 8px;border-radius:4px;}
  #queue-scroll{display:flex;align-items:flex-end;gap:6px;width:100%;overflow-x:auto;padding-top:18px;}
  #queue-scroll::-webkit-scrollbar{height:0;}
  .q-customer{display:flex;flex-direction:column;align-items:center;min-width:42px;position:relative;animation:q-enter 0.4s ease-out;}
  @keyframes q-enter{0%{opacity:0;transform:translateX(20px);}100%{opacity:1;transform:translateX(0);}}
  .q-bubble{position:absolute;top:-22px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid #E0A0B0;padding:2px 6px;font-size:9px;color:#5A3A4A;white-space:nowrap;border-radius:8px;animation:bubble-pop 0.2s ease-out,bubble-fade 2.5s ease-in forwards;pointer-events:none;box-shadow:1px 1px 0 #F0D0D8;z-index:30;}
  .q-bubble::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:3px solid transparent;border-right:3px solid transparent;border-top:4px solid #fff;}
  #scene-area{position:absolute;top:100px;left:0;right:0;bottom:200px;z-index:5;overflow:hidden;}
  #idle-scene{width:100%;height:100%;position:absolute;top:0;left:0;transition:opacity 0.3s;}
  #wall{position:absolute;top:0;left:0;right:0;height:40px;background:linear-gradient(180deg,#FFE8D0,#FFD8B8);border-bottom:3px solid #E8C8A0;}
  .wall-frame{position:absolute;top:6px;width:32px;height:24px;background:#FFF;border:2px solid #E8C8A0;border-radius:3px;}
  .wall-frame-inner{position:absolute;top:2px;left:2px;right:2px;bottom:2px;border-radius:2px;}
  #idle-desk{position:absolute;bottom:10px;left:60px;right:60px;height:40px;background:linear-gradient(180deg,#FFE0B0,#F0C880);border:3px solid #D4A860;border-radius:6px 6px 0 0;box-shadow:2px 2px 0 #C09850;}
  #idle-desk-items{position:absolute;top:-12px;left:8px;display:flex;gap:8px;align-items:flex-end;}
  .dti-m{width:20px;height:16px;background:#444;border:2px solid #666;border-radius:2px;position:relative;}
  .dti-m::before{content:'';position:absolute;top:2px;left:2px;right:2px;bottom:3px;background:#7BC8E8;border-radius:1px;}
  .dti-s{width:8px;height:12px;background:#C04040;border:1px solid #903030;border-radius:2px 2px 0 0;}
  .dti-p{width:12px;height:9px;background:#fff;border:1px solid #ddd;}
  .dti-n{height:10px;padding:0 4px;background:#FFD700;border:1px solid #DAA520;border-radius:2px;font-size:6px;color:#8B4513;display:flex;align-items:center;}
  #serving-scene{width:100%;height:100%;position:absolute;top:0;left:0;display:none;align-items:flex-end;justify-content:center;gap:0;background:linear-gradient(180deg,#FFF8F0,#FFF0E0);padding-bottom:0;}
  .sv-wrap{display:flex;flex-direction:column;align-items:center;animation:sv-enter 0.4s ease-out;}
  .sv-wrap .sv-name{font-size:10px;color:#5A3A4A;background:rgba(255,255,255,0.8);padding:1px 8px;border-radius:4px;border:1px solid #E8C8D0;margin-top:1px;}
  #sv-desk{width:180px;height:34px;background:linear-gradient(180deg,#FFE0B0,#F0C880);border:3px solid #D4A860;border-radius:6px 6px 0 0;box-shadow:2px 2px 0 #C09850;align-self:flex-end;margin:0 -16px;position:relative;top:3px;z-index:-1;flex-shrink:0;}
  #sv-desk-items{position:absolute;top:-10px;left:8px;display:flex;gap:6px;align-items:flex-end;}
  @keyframes sv-enter{0%{opacity:0;transform:translateY(16px);}100%{opacity:1;transform:translateY(0);}}
  .sv-teller-bubble{position:absolute;top:-24px;left:50%;transform:translateX(-50%);background:#FFFDE0;border:2px solid #E0D070;padding:3px 10px;font-size:10px;color:#5A4A2A;white-space:nowrap;border-radius:8px;animation:bubble-pop 0.3s ease-out,bubble-fade 3.5s ease-in forwards;pointer-events:none;box-shadow:1px 1px 0 #E8DCA0;z-index:20;}
  .sv-teller-bubble::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid #FFFDE0;}
  #task-panel{position:absolute;bottom:0;left:0;right:0;height:200px;background:rgba(40,25,60,0.96);border-top:3px solid #FFB0C0;border-radius:12px 12px 0 0;z-index:50;display:none;flex-direction:column;padding:8px 12px 6px;}
  #task-dialog{color:#FFE8F0;font-size:12px;margin-bottom:4px;line-height:1.4;min-height:18px;}
  #task-buttons{display:flex;flex-wrap:wrap;gap:5px;flex:1;align-content:flex-start;}
  .task-btn{padding:7px 8px;font-family:'Galmuri11','Malgun Gothic',monospace;font-size:12px;font-weight:bold;border:none;cursor:pointer;border-radius:7px;border-bottom:3px solid;color:#fff;text-shadow:1px 1px 0 rgba(0,0,0,0.3);flex:1;min-width:88px;transition:transform 0.1s,filter 0.1s;}
  .task-btn:hover{filter:brightness(1.15);transform:translateY(-1px);}
  .task-btn:active{border-bottom:1px solid;transform:translateY(2px);}
  .task-btn.deposit{background:linear-gradient(180deg,#64B5F6,#42A5F5);border-color:#1E88E5;}
  .task-btn.withdraw{background:linear-gradient(180deg,#FFB74D,#FFA726);border-color:#F57C00;}
  .task-btn.loan{background:linear-gradient(180deg,#CE93D8,#BA68C8);border-color:#8E24AA;}
  .task-btn.handle{background:linear-gradient(180deg,#EF5350,#E53935);border-color:#C62828;}
  .task-btn.correct{animation:flash-correct 0.3s;}
  .task-btn.wrong{animation:flash-wrong 0.3s;}
  #minigame-bar{width:100%;height:16px;background:#1A1030;border:2px solid #6A5ACD;border-radius:6px;margin-bottom:4px;position:relative;display:none;overflow:hidden;}
  #minigame-fill{height:100%;background:linear-gradient(90deg,#7BD47B,#4CAF50);width:0%;transition:width 0.15s;border-radius:4px;}
  #minigame-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:8px;color:#fff;text-shadow:1px 1px 0 #000;}
  #day-result{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(30,15,50,0.9);z-index:60;display:none;flex-direction:column;align-items:center;justify-content:center;color:#fff;}
  #day-result h2{font-size:24px;color:#FFD700;margin-bottom:18px;}
  .result-line{font-size:14px;margin:6px 0;}
  .bonus{color:#7BD47B;}.penalty{color:#EF5350;}
  #level-up-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:65;display:none;flex-direction:column;align-items:center;justify-content:center;}
  #level-up-overlay h2{font-size:28px;color:#FFD700;animation:pulse-text 0.5s infinite alternate;}
  #level-up-overlay p{font-size:15px;color:#FFE8F0;margin-top:10px;}
  .float-text{position:absolute;font-size:15px;font-weight:bold;pointer-events:none;z-index:55;animation:float-up 1.5s forwards;font-family:'Galmuri11',monospace;}
  @keyframes float-up{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-60px);}}
  @keyframes flash-correct{0%,100%{opacity:1;}50%{opacity:0.5;background:#4CAF50;}}
  @keyframes flash-wrong{0%,100%{opacity:1;}50%{opacity:0.5;background:#f44336;}}
  @keyframes pulse-text{from{transform:scale(1);}to{transform:scale(1.1);}}
  @keyframes bubble-pop{0%{transform:scale(0);opacity:0;}70%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}
  @keyframes bubble-fade{0%,65%{opacity:1;}100%{opacity:0;}}
  #day-intro{position:absolute;top:0;left:0;right:0;bottom:0;z-index:70;display:none;background:linear-gradient(180deg,#E8F4FF,#FFF8F0,#FFF0E0);overflow:hidden;}
  #day-intro canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
  #intro-text{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);font-size:18px;color:#5A3A4A;text-align:center;text-shadow:1px 1px 0 #fff;opacity:0;transition:opacity 0.4s;white-space:nowrap;}
  #intro-skip{position:absolute;bottom:16px;right:16px;font-family:'Galmuri11','Malgun Gothic',monospace;font-size:11px;background:rgba(0,0,0,0.3);color:#fff;border:1px solid rgba(255,255,255,0.4);padding:4px 12px;border-radius:6px;cursor:pointer;z-index:2;}
  #intro-skip:hover{background:rgba(0,0,0,0.5);}
  /* Lunch overlay */
  #lunch-overlay{position:absolute;top:0;left:0;right:0;bottom:0;z-index:72;display:none;background:#87CEEB;overflow:hidden;}
  #lunch-overlay canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
  #lunch-text{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:14px;color:#fff;text-shadow:1px 1px 2px #000;z-index:2;white-space:nowrap;}
  #lunch-dpad{position:absolute;bottom:20px;left:20px;z-index:3;display:grid;grid-template-columns:48px 48px 48px;grid-template-rows:48px 48px 48px;gap:2px;-webkit-user-select:none;user-select:none;}
  .dpad-btn{width:48px;height:48px;background:rgba(255,255,255,0.35);border:2px solid rgba(255,255,255,0.5);border-radius:10px;font-size:18px;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-user-select:none;user-select:none;touch-action:none;}
  .dpad-btn:active{background:rgba(255,255,255,0.7);}
  #lunch-joystick{position:absolute;bottom:30px;left:30px;z-index:3;width:120px;height:120px;-webkit-user-select:none;user-select:none;touch-action:none;display:none;}
  .joystick-base{width:120px;height:120px;background:rgba(255,255,255,0.2);border:3px solid rgba(255,255,255,0.4);border-radius:50%;position:relative;}
  .joystick-knob{width:44px;height:44px;background:rgba(255,255,255,0.6);border:2px solid rgba(255,255,255,0.8);border-radius:50%;position:absolute;top:38px;left:38px;transition:none;}
  .dpad-spacer{width:48px;height:48px;}
</style>
</head>
<body>
<div id="game-container">
  <div id="title-screen">
    <div class="title-bg"></div>
    <div class="title-cloud" style="width:60px;height:24px;top:30px;left:-50px;animation-duration:18s;"></div>
    <div class="title-cloud" style="width:45px;height:18px;top:60px;left:-80px;animation-duration:22s;animation-delay:3s;"></div>
    <div class="title-cloud" style="width:70px;height:26px;top:15px;left:-30px;animation-duration:25s;animation-delay:8s;"></div>
    <canvas class="star" id="star1" width="12" height="12" style="top:25px;left:60px;"></canvas>
    <canvas class="star" id="star2" width="12" height="12" style="top:50px;right:80px;animation-delay:0.7s;"></canvas>
    <canvas class="star" id="star3" width="12" height="12" style="top:10px;left:300px;animation-delay:1.3s;"></canvas>
    <div class="title-bank"><div class="bank-main"><div class="bank-roof"></div><div class="bank-sign">눙헙은행</div><div class="bank-window-cute" style="top:72px;left:18px"></div><div class="bank-window-cute" style="top:72px;right:18px"></div><div class="bank-door-cute"></div></div></div>
    <div class="title-chars"><canvas id="title-char1" width="64" height="80"></canvas><canvas id="title-char2" width="64" height="80"></canvas></div>
    <h1>은행원 키우기<br>타이쿤</h1>
    <div class="subtitle">눙 헙 은 행 에 &nbsp; 오 신 걸 &nbsp; 환 영 합 니 다</div>
    <button class="pixel-btn" onclick="showCharSelect()">게 임 시 작</button>
  </div>
  <div id="char-select">
    <h2>~ 캐릭터를 선택하세요 ~</h2>
    <div class="char-options">
      <div class="char-card" id="card-jungmin" onclick="selectChar('jungmin')"><canvas id="preview-jungmin" width="96" height="120"></canvas><h3>정민</h3><p>네이비 유니폼<br>꼼꼼하고 차분한 성격</p><div class="char-stat">업무 정확도 +10%</div></div>
      <div class="char-card" id="card-junghyun" onclick="selectChar('junghyun')"><canvas id="preview-junghyun" width="96" height="120"></canvas><h3>정현</h3><p>와인 유니폼<br>빠르고 친절한 성격</p><div class="char-stat">처리 속도 +10%</div></div>
    </div>
    <button class="pixel-btn pixel-btn-green" id="start-btn" onclick="startGame()" style="opacity:0.4;pointer-events:none">선 택 완 료</button>
  </div>
  <div id="game-screen">
    <div id="hud">
      <div class="hud-item"><span class="hud-label">날짜</span><span class="hud-value" id="hud-day">1일</span></div>
      <div class="hud-item"><span class="hud-label">레벨</span><span class="hud-value" id="hud-level">1</span></div>
      <div class="hud-item"><span class="hud-label">골드</span><span class="hud-value" id="hud-gold">0</span></div>
      <div class="hud-item"><span class="hud-label">경험치</span><span class="hud-value" id="hud-exp">0</span></div>
      <div id="time-bar-container"><div id="time-bar"></div><span id="time-label">09:00</span></div>
    </div>
    <div id="bank-interior">
      <div id="sky-overlay"></div>
      <div id="queue-strip">
        <div id="queue-label">대기 손님: <span id="queue-count">0</span>명</div>
        <div id="queue-scroll"></div>
      </div>
      <div id="scene-area">
        <div id="idle-scene">
          <div id="wall">
            <div class="wall-frame" style="left:20px;"><div class="wall-frame-inner" style="background:#E8F4FF;"></div></div>
            <div class="wall-frame" style="left:180px;"><div class="wall-frame-inner" style="background:#FFE8F0;"></div></div>
            <div class="wall-frame" style="right:20px;"><div class="wall-frame-inner" style="background:#E8FFE8;"></div></div>
          </div>
          <div id="idle-desk">
            <div id="idle-desk-items"><div class="dti-m"></div><div class="dti-s"></div><div class="dti-p"></div><div class="dti-n" id="nameplate"></div></div>
          </div>
          <canvas id="teller-canvas" width="64" height="80" style="position:absolute;bottom:36px;left:50%;transform:translateX(-50%);"></canvas>
        </div>
        <div id="serving-scene">
          <div class="sv-wrap" id="sv-teller-wrap" style="position:relative;">
            <canvas id="sv-teller" width="98" height="126"></canvas>
            <div class="sv-name" id="sv-teller-name"></div>
          </div>
          <div id="sv-desk"><div id="sv-desk-items"><div class="dti-m"></div><div class="dti-s"></div><div class="dti-p"></div></div></div>

  fillP(ctx,cx+1,20,s,'#3A3040');fillP(ctx,cx+2,20,s,'#2A2028');fillP(ctx,cx+3,20,s,'#1A1018');fillP(ctx,cx+6,20,s,'#3A3040');fillP(ctx,cx+7,20,s,'#2A2028');fillP(ctx,cx+8,20,s,'#1A1018');

  fillP(ctx,cx+1,20,s,'#FFF');fillP(ctx,cx+2,20,s,'#F0F0F0');fillP(ctx,cx+3,20,s,'#E8E8E8');fillP(ctx,cx+6,20,s,'#FFF');fillP(ctx,cx+7,20,s,'#F0F0F0');fillP(ctx,cx+8,20,s,'#E8E8E8');

const CT={
  ajumma:{name:'아줌마',hair:'#2A1A10',hairH:'#4A3020',skin:'#FFE0C8',skinS:'#F0C8A8',top:'#D070A0',topH:'#E890B8',topS:'#B05080',pants:'#6A4070',eye:'#4A3030',hasPerm:1,hasLip:1},
  ajussi:{name:'아저씨',hair:'#1A1A20',hairH:'#3A3A48',skin:'#F8D8B8',skinS:'#E8C0A0',top:'#5A7A9A',topH:'#7A9AB8',topS:'#3A5A7A',pants:'#3A3A50',eye:'#2A2A3A',hasStubble:1},
  grandma:{name:'할머니',hair:'#C0B8B0',hairH:'#E0D8D0',skin:'#F0D8C0',skinS:'#E0C0A0',top:'#8A70A0',topH:'#A890B8',topS:'#6A5080',pants:'#5A4A5A',eye:'#5A5060',hasBun:1,isShort:1},
  grandpa:{name:'할아버지',hair:'#B0A8A0',hairH:'#D0C8C0',skin:'#F0D8C0',skinS:'#E0C0A0',top:'#708898',topH:'#90A8B0',topS:'#506878',pants:'#4A4A50',eye:'#505058',hasBald:1,hasGlasses:1},
  student:{name:'학생',hair:'#1A1428',hairH:'#3A2848',skin:'#FFE8D0',skinS:'#F0D0B0',top:'#FFFFFF',topH:'#F0F0F0',topS:'#D0D0D8',pants:'#2A2A40',eye:'#3A4080',hasUniform:1},

function drawChibiCustomer(ctx,tk,s){
  ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);const c=CT[tk]||CT.ajumma;const cx=4,sm=c.isSmall,yo=sm?4:0;
  if(c.hasBald){fillR(ctx,cx,yo,6,1,s,c.skin);fillP(ctx,cx-1,1+yo,s,c.hair);fillP(ctx,cx+6,1+yo,s,c.hair);fillR(ctx,cx,1+yo,6,1,s,c.skinS);}
  else if(c.hasBun){fillR(ctx,cx+1,yo-1,4,1,s,c.hair);fillR(ctx,cx,yo,6,1,s,c.hair);fillR(ctx,cx-1,1+yo,8,2,s,c.hair);fillP(ctx,cx+2,yo-1,s,c.hairH);fillP(ctx,cx+3,yo,s,c.hairH);}
  else if(c.hasPerm){fillR(ctx,cx,yo,6,1,s,c.hair);fillR(ctx,cx-1,1+yo,8,2,s,c.hair);fillP(ctx,cx-2,2+yo,s,c.hair);fillP(ctx,cx+7,2+yo,s,c.hair);fillP(ctx,cx-2,3+yo,s,c.hairH);fillP(ctx,cx+7,3+yo,s,c.hairH);fillP(ctx,cx+1,yo,s,c.hairH);fillP(ctx,cx+4,yo,s,c.hairH);}
  else{fillR(ctx,cx,yo,6,1,s,c.hair);fillR(ctx,cx-1,1+yo,8,2,s,c.hair);fillP(ctx,cx+1,1+yo,s,c.hairH);fillP(ctx,cx+2,yo,s,c.hairH);}
  if(!c.hasBald){fillP(ctx,cx-1,3+yo,s,c.hair);fillP(ctx,cx+6,3+yo,s,c.hair);fillP(ctx,cx-1,4+yo,s,c.hair);fillP(ctx,cx+6,4+yo,s,c.hair);fillP(ctx,cx-1,5+yo,s,c.hairH);fillP(ctx,cx+6,5+yo,s,c.hairH);}
  fillR(ctx,cx,3+yo,6,4,s,c.skin);fillP(ctx,cx,3+yo,s,c.skinS);fillP(ctx,cx+5,3+yo,s,c.skinS);fillP(ctx,cx,6+yo,s,c.skinS);fillP(ctx,cx+5,6+yo,s,c.skinS);
  fillP(ctx,cx+1,4+yo,s,c.eye);fillP(ctx,cx+4,4+yo,s,c.eye);fillP(ctx,cx,5+yo,s,'#FFB8A8');fillP(ctx,cx+5,5+yo,s,'#FFB8A8');
  if(c.hasGlasses){fillP(ctx,cx,4+yo,s,'#888');fillP(ctx,cx+2,4+yo,s,'#888');fillP(ctx,cx+3,4+yo,s,'#888');fillP(ctx,cx+5,4+yo,s,'#888');}
  if(c.isAngry){fillP(ctx,cx+1,3+yo,s,'#600');fillP(ctx,cx+4,3+yo,s,'#600');fillP(ctx,cx+2,6+yo,s,'#C04040');fillP(ctx,cx+3,6+yo,s,'#C04040');}
  else if(c.hasLip){fillP(ctx,cx+2,6+yo,s,'#D06080');fillP(ctx,cx+3,6+yo,s,'#D06080');}
  else if(sm){fillP(ctx,cx+2,6+yo,s,'#E0A0A0');}else{fillP(ctx,cx+2,6+yo,s,'#D09080');}
  if(c.hasStubble){fillP(ctx,cx+1,6+yo,s,'#C8B8A8');fillP(ctx,cx+4,6+yo,s,'#C8B8A8');}
  const bY=7+yo;fillR(ctx,cx,bY,6,4,s,c.top);fillP(ctx,cx+2,bY,s,c.topH);fillP(ctx,cx+3,bY,s,c.topH);fillP(ctx,cx,bY+1,s,c.topS);fillP(ctx,cx+5,bY+1,s,c.topS);
  if(c.hasUniform){fillP(ctx,cx+1,bY,s,'#2A2A60');fillP(ctx,cx+4,bY,s,'#2A2A60');fillP(ctx,cx+2,bY+1,s,'#FF4040');fillP(ctx,cx+3,bY+1,s,'#FF4040');}
  if(c.hasTie){fillP(ctx,cx+2,bY+1,s,'#DAA520');fillP(ctx,cx+2,bY+2,s,'#FFD700');}
  fillP(ctx,cx-1,bY+1,s,c.top);fillP(ctx,cx+6,bY+1,s,c.top);fillP(ctx,cx-1,bY+2,s,c.topH);fillP(ctx,cx+6,bY+2,s,c.topH);fillP(ctx,cx-1,bY+3,s,c.skin);fillP(ctx,cx+6,bY+3,s,c.skin);
  if(!sm){fillR(ctx,cx,bY+4,6,2,s,c.pants);fillP(ctx,cx,bY+6,s,'#2A2028');fillP(ctx,cx+1,bY+6,s,'#2A2028');fillP(ctx,cx+4,bY+6,s,'#2A2028');fillP(ctx,cx+5,bY+6,s,'#2A2028');}
  else{fillR(ctx,cx,bY+4,6,1,s,c.pants);fillP(ctx,cx,bY+5,s,'#E06030');fillP(ctx,cx+1,bY+5,s,'#E06030');fillP(ctx,cx+4,bY+5,s,'#E06030');fillP(ctx,cx+5,bY+5,s,'#E06030');}
}

  if(!STATE.dayActive||STATE.queue.length===0)return;
  const scroll=document.getElementById('queue-scroll');
  const items=scroll.querySelectorAll('.q-customer');if(!items.length)return;
  const pick=items[Math.floor(Math.random()*items.length)];
  const old=pick.querySelector('.q-bubble');if(old)old.remove();
  const b=document.createElement('div');b.className='q-bubble';
  b.textContent=CL[Math.floor(Math.random()*CL.length)];
  pick.appendChild(b);setTimeout(()=>b.remove(),2500);
}
function spawnTellerBubble(){
  if(!STATE.dayActive)return;
  const wrap=document.getElementById('sv-teller-wrap');
  const target=document.getElementById('serving-scene').style.display==='flex'?wrap:null;
  if(!target)return;
  target.querySelectorAll('.sv-teller-bubble').forEach(b=>b.remove());
  const b=document.createElement('div');b.className='sv-teller-bubble';
  b.textContent=TL[Math.floor(Math.random()*TL.length)];
  target.appendChild(b);setTimeout(()=>b.remove(),3500);
}

    else if(el<CE){const cp=(el-TE)/(CE-TE),cx2=W/2-40,cy2=H*.65-110;drawDr(ctx,0);drawChibiTeller(uniformCanvas.getContext('2d'),type,4,Math.floor(el/300));ctx.drawImage(uniformCanvas,cx2,cy2);const cR=40*(1+.3*Math.sin(cp*Math.PI)),mn=55+cp*5;drawCl(ctx,W/2,130,cR,9,mn>=60?0:mn);if(cp>.7){const rf=(cp-.7)/.3;for(let r=0;r<3;r++){ctx.strokeStyle=`rgba(255,215,0,${(1-rf)*.5})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(W/2,130,cR+10+r*15+rf*20,0,Math.PI*2);ctx.stroke();}}textEl.textContent='오전 9:00 - 영업 시작!';textEl.style.opacity='1';}
    else if(el<RE){const rp=(el-CE)/(RE-CE),cx2=W/2-40,cy2=H*.65-110;drawDr(ctx,Math.min(1,rp*2));drawChibiTeller(uniformCanvas.getContext('2d'),type,4,Math.floor(el/300));ctx.drawImage(uniformCanvas,cx2,cy2);const nv=Math.min(custCanvases.length,Math.floor(rp*custCanvases.length*1.5));for(let i=0;i<nv;i++){const cp2=Math.min(1,(rp-i/(custCanvases.length*1.5))*2);if(cp2<=0)continue;ctx.drawImage(custCanvases[i],W-60+(30+i*50-(W-60))*Math.min(1,cp2),H*.65-70+Math.sin((el+i*200)*.01)*2);}textEl.textContent='손님들이 들어옵니다!';textEl.style.opacity='1';}
    else if(el<NE){const np=(el-RE)/(NE-RE),cx2=W/2-40,cy2=H*.65-110;drawDr(ctx,1);drawChibiTeller(uniformCanvas.getContext('2d'),type,4,Math.floor(el/300));ctx.drawImage(uniformCanvas,cx2,cy2);for(let i=0;i<custCanvases.length;i++)ctx.drawImage(custCanvases[i],30+i*50,H*.65-70);const cn=Math.min(custTotal,Math.floor(np*custTotal*1.5)+1);drawNM(ctx,W/2-30,H*.65+20,cn);for(let i=0;i<Math.min(cn,custCanvases.length);i++){const cx3=30+i*50,cy3=H*.65-85;ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fillRect(cx3+8,cy3,32,16);ctx.strokeStyle='#E8C8A0';ctx.lineWidth=1;ctx.strokeRect(cx3+8,cy3,32,16);ctx.fillStyle='#5A3A4A';ctx.font='bold 9px Galmuri11,monospace';ctx.textAlign='center';ctx.fillText(String(i+1).padStart(3,'0'),cx3+24,cy3+12);ctx.textAlign='left';}textEl.textContent='대기번호 발급 중... ('+cn+'/'+custTotal+')';textEl.style.opacity='1';}

let timeInterval,animInterval;
function startDay(){
  STATE.timeLeft=100;STATE.customersServed=0;STATE.customersFailed=0;STATE.currentCustomer=null;STATE.queue=[];STATE.dayActive=true;STATE.comboCount=0;STATE.dailyGold=0;STATE.dailyExp=0;STATE.lunchDone=false;
  STATE.customersTotal=Math.min(4+STATE.day,15);
  updateHUD();generateCustomers();startBubbles();showIdle();
  timeInterval=setInterval(()=>{if(!STATE.dayActive)return;STATE.timeLeft-=0.35;if(STATE.timeLeft<=0){STATE.timeLeft=0;endDay(false);}updateTimeBar();},200);
  animInterval=setInterval(()=>{if(!STATE.dayActive)return;STATE.animFrame++;drawChibiTeller(document.getElementById('teller-canvas').getContext('2d'),STATE.character,4,STATE.animFrame);updateServingTeller();},600);
  setTimeout(()=>serveNext(),600);
}
function generateCustomers(){
  for(let i=0;i<STATE.customersTotal;i++){
    let taskIdx=Math.floor(Math.random()*TASKS.length);
    if(STATE.day>=3&&Math.random()<0.12*(STATE.day-2))taskIdx=3;
    const task=TASKS[taskIdx];
    const pool=TCP[task.type];
    const cust={task,custType:pool[Math.floor(Math.random()*pool.length)]};
    if(task.type==='deposit'){
      cust.pin=String(Math.floor(1000+Math.random()*9000));
      cust.amount=DEPOSIT_AMTS[Math.floor(Math.random()*DEPOSIT_AMTS.length)];
      cust.dialog=`"비밀번호 ${cust.pin}, ${cust.amount}만원 입금 부탁드려요."`;
    }else if(task.type==='withdraw'){
      cust.amount=WITHDRAW_AMTS[Math.floor(Math.random()*WITHDRAW_AMTS.length)];
      cust.dialog=`"${cust.amount}만원 출금해주세요."`;
    }else if(task.type==='loan'){
      cust.scenario=LOAN_SCENARIOS[Math.floor(Math.random()*LOAN_SCENARIOS.length)];
      cust.dialog=cust.scenario.dialog;
    }else{
      cust.dialog=task.dialogs[Math.floor(Math.random()*task.dialogs.length)];
    }
    STATE.queue.push(cust);
  }
  updateQueueDisplay();
}
function serveNext(){
  if(!STATE.dayActive)return;
  // Lunch break check: 12:00 = timeLeft ~66.67
  const h=9+Math.floor((100-STATE.timeLeft)*9/100);
  if(h>=12&&!STATE.lunchDone){startLunchBreak();return;}
  if(STATE.queue.length===0){endDay(true);return;}
  STATE.currentCustomer=STATE.queue.shift();updateQueueDisplay();
  showServing(STATE.currentCustomer);showTaskPanel(STATE.currentCustomer);
}

  const ctx=canvas.getContext('2d');const W=480,H=650;canvas.width=W;canvas.height=H;
  const player={x:50,y:H/2,vx:0,vy:0,speed:6,accel:0.8,friction:0.82};

  let lunchTime=20,done=false;
  // Fewer, smaller obstacles - only on upper/lower paths
  const obstacles=[
    {x:200,y:H*.32,w:30,h:14,type:'bench'},
    {x:330,y:H*.60,w:30,h:14,type:'bench'},
    {x:270,y:H*.42,w:20,h:20,type:'trash'},
  ];
  const MGR_LINES=["일 안하나?","자네 지금 뭐하는건가?","어딜 가는거야!","점심은 무슨 점심!","다시 돌아가!","빨리 복귀해!!","자네 각오해!","누가 나가래?!","오늘 야근이다!"];
  let mgrBubble='',mgrBubbleTime=0;
  // Analog input: -1 to 1
  let inputX=0,inputY=0;
  const keys={up:false,down:false,left:false,right:false};
  // Player sprite
  const plC=document.createElement('canvas');plC.width=60;plC.height=80;
  drawChibiTeller(plC.getContext('2d'),STATE.character,3,0);
  // Manager sprite
  const mgC=document.createElement('canvas');mgC.width=48;mgC.height=60;
  const mc=mgC.getContext('2d'),ms=3;
  fillR(mc,4,0,6,1,ms,'#1A1A28');fillR(mc,3,1,8,2,ms,'#1A1A28');fillR(mc,4,3,6,4,ms,'#F0D0B0');
  fillP(mc,5,4,ms,'#2A2A40');fillP(mc,8,4,ms,'#2A2A40');fillP(mc,4,4,ms,'#444');fillP(mc,6,4,ms,'#444');fillP(mc,7,4,ms,'#444');fillP(mc,9,4,ms,'#444');
  fillP(mc,6,6,ms,'#A08070');fillP(mc,7,6,ms,'#A08070');
  fillR(mc,4,7,6,4,ms,'#2A2A40');fillP(mc,6,7,ms,'#B0B0B8');fillP(mc,7,7,ms,'#B0B0B8');fillP(mc,6,8,ms,'#C04040');
  fillR(mc,3,8,1,2,ms,'#2A2A40');fillR(mc,10,8,1,2,ms,'#2A2A40');
  fillR(mc,4,11,6,2,ms,'#3A3A50');fillP(mc,4,13,ms,'#1A1A28');fillP(mc,5,13,ms,'#1A1A28');fillP(mc,8,13,ms,'#1A1A28');fillP(mc,9,13,ms,'#1A1A28');
  // Keyboard controls
  function kd(e){
    if(e.key==='ArrowUp'||e.key==='w')keys.up=true;
    if(e.key==='ArrowDown'||e.key==='s')keys.down=true;
    if(e.key==='ArrowLeft'||e.key==='a')keys.left=true;
    if(e.key==='ArrowRight'||e.key==='d')keys.right=true;
    e.preventDefault();
  }
  function ku(e){
    if(e.key==='ArrowUp'||e.key==='w')keys.up=false;
    if(e.key==='ArrowDown'||e.key==='s')keys.down=false;
    if(e.key==='ArrowLeft'||e.key==='a')keys.left=false;
    if(e.key==='ArrowRight'||e.key==='d')keys.right=false;
  }
  document.addEventListener('keydown',kd);document.addEventListener('keyup',ku);
  // D-pad buttons (desktop fallback)
  const dpadBtns=dpad.querySelectorAll('.dpad-btn');
  dpadBtns.forEach(b=>{
    const d=b.dataset.dir;
    const on=e=>{e.preventDefault();keys[d]=true;};
    const off=()=>{keys[d]=false;};
    b.addEventListener('mousedown',on);b.addEventListener('mouseup',off);b.addEventListener('mouseleave',off);
    b.addEventListener('touchstart',on,{passive:false});b.addEventListener('touchend',off);b.addEventListener('touchcancel',off);
  });
  // Joystick touch controls
  let joyActive=false;
  const joyBase=joystick.querySelector('.joystick-base');
  function handleJoy(e){
    e.preventDefault();
    const rect=joyBase.getBoundingClientRect();
    const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
    const touch=e.touches?e.touches[0]:e;
    let dx=touch.clientX-cx,dy=touch.clientY-cy;
    const maxR=rect.width/2-10;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>maxR){dx=dx/dist*maxR;dy=dy/dist*maxR;}
    knob.style.left=(38+dx)+'px';knob.style.top=(38+dy)+'px';
    inputX=dx/maxR;inputY=dy/maxR;
    // Dead zone
    if(Math.abs(inputX)<0.15)inputX=0;
    if(Math.abs(inputY)<0.15)inputY=0;
  }
  function endJoy(){joyActive=false;inputX=0;inputY=0;knob.style.left='38px';knob.style.top='38px';}
  joyBase.addEventListener('touchstart',e=>{e.preventDefault();joyActive=true;handleJoy(e);},{passive:false});
  joyBase.addEventListener('touchmove',e=>{if(joyActive)handleJoy(e);},{passive:false});
  joyBase.addEventListener('touchend',endJoy);joyBase.addEventListener('touchcancel',endJoy);
  // Also support canvas touch (tap to move toward point)
  let canvasTouch=null;
  canvas.addEventListener('touchstart',e=>{e.preventDefault();canvasTouch=e.touches[0];},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();canvasTouch=e.touches[0];},{passive:false});
  canvas.addEventListener('touchend',e=>{canvasTouch=null;},{passive:false});
  canvas.addEventListener('touchcancel',e=>{canvasTouch=null;},{passive:false});
  // Timer - 20 seconds
  const ti=setInterval(()=>{lunchTime--;if(lunchTime<=0&&!done){done=true;endL(false);}},1000);
  function endL(success){
    done=true;clearInterval(ti);
    document.removeEventListener('keydown',kd);document.removeEventListener('keyup',ku);
    textEl.textContent=success?'편의점 도시락 획득! +80G':'시간 초과... 컵라면이라도... +20G';
    const bonus=success?80:20;STATE.gold+=bonus;STATE.dailyGold+=bonus;updateHUD();
    setTimeout(()=>{
      overlay.style.display='none';dpad.style.display='none';joystick.style.display='none';
      const oldDpad=document.getElementById('lunch-dpad');
      const newDpad=oldDpad.cloneNode(true);oldDpad.parentNode.replaceChild(newDpad,oldDpad);
      newDpad.style.display='none';
      STATE.dayActive=true;
      timeInterval=setInterval(()=>{if(!STATE.dayActive)return;STATE.timeLeft-=0.35;if(STATE.timeLeft<=0){STATE.timeLeft=0;endDay(false);}updateTimeBar();},200);
      serveNext();
    },2000);
  }
  function collidesObs(ox,oy,ow,oh){
    for(const o of obstacles){if(ox+ow>o.x&&ox<o.x+o.w&&oy+oh>o.y&&oy<o.y+o.h)return true;}return false;
  }
  function loop(){
    if(done)return;
    // Compute input from keyboard or joystick or canvas tap
    let ix=inputX,iy=inputY;
    if(keys.left)ix=-1;if(keys.right)ix=1;
    if(keys.up)iy=-1;if(keys.down)iy=1;
    // Canvas touch: move toward touch point
    if(canvasTouch&&!joyActive){
      const rect=canvas.getBoundingClientRect();
      const tx=(canvasTouch.clientX-rect.left)*(W/rect.width);
      const ty=(canvasTouch.clientY-rect.top)*(H/rect.height);
      const ddx=tx-player.x,ddy=ty-player.y;
      const dd=Math.sqrt(ddx*ddx+ddy*ddy);
      if(dd>10){ix=ddx/dd;iy=ddy/dd;}
    }
    // Normalize diagonal
    const mag=Math.sqrt(ix*ix+iy*iy);
    if(mag>1){ix/=mag;iy/=mag;}
    // Apply acceleration-based movement
    player.vx+=ix*player.accel;player.vy+=iy*player.accel;
    player.vx*=player.friction;player.vy*=player.friction;
    // Clamp speed
    const spd=Math.sqrt(player.vx*player.vx+player.vy*player.vy);
    if(spd>player.speed){player.vx=player.vx/spd*player.speed;player.vy=player.vy/spd*player.speed;}
    let nx=player.x+player.vx,ny=player.y+player.vy;
    nx=Math.max(5,Math.min(W-30,nx));ny=Math.max(50,Math.min(H-120,ny));
    if(!collidesObs(nx,ny,12,16)){player.x=nx;player.y=ny;}
    else if(!collidesObs(nx,player.y,12,16)){player.x=nx;player.vy*=-0.3;}
    else if(!collidesObs(player.x,ny,12,16)){player.y=ny;player.vx*=-0.3;}
    else{player.vx*=-0.3;player.vy*=-0.3;}
    // Manager AI: slow patrol, very weak chase
    let mx=mgr.x+mgr.dx*mgr.speed,my=mgr.y+mgr.dy*mgr.speed;
    if(mx<130||mx>W-140)mgr.dx*=-1;
    if(my<110||my>H-200)mgr.dy*=-1;
    if(!collidesObs(mx,my,20,30)){mgr.x=mx;mgr.y=my;}else{mgr.dx*=-1;mgr.dy*=-1;}
    if(Math.random()<0.02)mgr.dy=(Math.random()*2-1)*0.4;
    const dist=Math.sqrt((player.x-mgr.x)**2+(player.y-mgr.y)**2);
    if(dist<80){mgr.x+=(player.x-mgr.x)*0.001;mgr.y+=(player.y-mgr.y)*0.001;}
    // Manager speech bubble
    mgrBubbleTime--;
    if(mgrBubbleTime<=0){mgrBubble=MGR_LINES[Math.floor(Math.random()*MGR_LINES.length)];mgrBubbleTime=90+Math.floor(Math.random()*60);}
    // Collision with manager - very forgiving
    if(Math.abs(player.x-mgr.x)<18&&Math.abs(player.y-mgr.y)<20){
      // Push player away instead of instant game over
      player.vx+=(player.x-mgr.x)*0.3;player.vy+=(player.y-mgr.y)*0.3;
      lunchTime=Math.max(0,lunchTime-3);
      floatText('-3초! 잡힐뻔!','#EF5350',player.x+200,player.y+200);
      mgr.dx*=-1;mgr.dy*=-1;
    }
    // Store reached
    if(player.x+25>store.x&&player.y>store.y-15&&player.y<store.y+store.h+15){done=true;endL(true);return;}
    // ===== DRAW =====
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#A8D8A8';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#999';ctx.fillRect(0,H*.3,W,H*.4);
    ctx.fillStyle='#BBB';for(let x=0;x<W;x+=60)ctx.fillRect(x+10,H*.49,30,4);
    ctx.fillStyle='#D0C8B8';ctx.fillRect(0,H*.25,W,H*.05);ctx.fillRect(0,H*.7,W,H*.05);
    // Bank
    ctx.fillStyle='#FFE8D0';ctx.fillRect(10,H*.35,55,H*.3);ctx.fillStyle='#FF9A9A';ctx.fillRect(10,H*.35,55,12);
    ctx.fillStyle='#8B4513';ctx.font='7px Galmuri11,monospace';ctx.textAlign='center';ctx.fillText('눙헙은행',37,H*.35+25);ctx.textAlign='left';
    // Store (bigger target, with glow)
    ctx.fillStyle='rgba(135,206,235,0.3)';ctx.fillRect(store.x-5,store.y-5,store.w+10,store.h+10);
    ctx.fillStyle='#87CEEB';ctx.fillRect(store.x,store.y,store.w,store.h);
    ctx.fillStyle='#4A90D0';ctx.fillRect(store.x,store.y,store.w,10);
    ctx.fillStyle='#FFF';ctx.font='8px Galmuri11,monospace';ctx.textAlign='center';ctx.fillText('편의점',store.x+store.w/2,store.y+30);
    // Arrow pointing to store
    ctx.fillStyle='#FFD700';ctx.font='bold 14px Galmuri11,monospace';ctx.fillText('>>>',store.x-30,store.y+store.h/2+4);
    ctx.textAlign='left';
    // Trees
    ctx.fillStyle='#5A8A5A';[160,260,360].forEach(tx=>{ctx.beginPath();ctx.arc(tx,H*.22,12,0,Math.PI*2);ctx.fill();ctx.fillStyle='#8B5E30';ctx.fillRect(tx-2,H*.22+8,4,12);ctx.fillStyle='#5A8A5A';});
    // Obstacles
    obstacles.forEach(o=>{
      if(o.type==='trash'){ctx.fillStyle='#708090';ctx.fillRect(o.x,o.y,o.w,o.h);ctx.fillStyle='#556070';ctx.fillRect(o.x+3,o.y-5,o.w-6,6);ctx.fillStyle='#888';ctx.fillRect(o.x+o.w/2-2,o.y-8,4,4);}
      else if(o.type==='bench'){ctx.fillStyle='#8B6B4A';ctx.fillRect(o.x,o.y,o.w,o.h);ctx.fillStyle='#A08060';ctx.fillRect(o.x+2,o.y+2,o.w-4,6);ctx.fillStyle='#6A4A30';ctx.fillRect(o.x+4,o.y+o.h,4,8);ctx.fillRect(o.x+o.w-8,o.y+o.h,4,8);}
    });
    // Manager
    ctx.drawImage(mgC,mgr.x-12,mgr.y-10);
    ctx.fillStyle='#EF5350';ctx.font='bold 8px Galmuri11,monospace';ctx.textAlign='center';ctx.fillText('지점장',mgr.x+12,mgr.y-14);
    // Manager speech bubble
    if(mgrBubbleTime>40){
      const bx=mgr.x+12,by=mgr.y-32;
      ctx.fillStyle='rgba(255,255,255,0.92)';
      const tw=ctx.measureText(mgrBubble).width+12;
      ctx.fillRect(bx-tw/2,by-12,tw,18);ctx.strokeStyle='#EF5350';ctx.lineWidth=1.5;ctx.strokeRect(bx-tw/2,by-12,tw,18);
      ctx.fillStyle='#C02020';ctx.font='bold 9px Galmuri11,monospace';
      ctx.fillText(mgrBubble,bx,by+1);
      ctx.fillStyle='rgba(255,255,255,0.92)';ctx.beginPath();ctx.moveTo(bx-4,by+6);ctx.lineTo(bx+4,by+6);ctx.lineTo(bx,by+12);ctx.fill();
    }
    ctx.textAlign='left';
    // Player
    ctx.drawImage(plC,player.x-15,player.y-25);
    // Timer
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(W/2-55,8,110,26);
    ctx.fillStyle=lunchTime<=5?'#EF5350':'#FFF';ctx.font='bold 12px Galmuri11,monospace';ctx.textAlign='center';ctx.fillText(`남은 시간: ${lunchTime}초`,W/2,26);ctx.textAlign='left';
    // Instructions
    ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(W/2-80,H-45,160,22);
    ctx.fillStyle='#FFF';ctx.font='9px Galmuri11,monospace';ctx.textAlign='center';ctx.fillText(isTouch?'화면을 터치하여 이동':'방향키/WASD로 이동',W/2,H-30);ctx.textAlign='left';
    textEl.textContent=`점심시간! 편의점까지 달려가세요! (${lunchTime}초)`;
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}

// ===== END DAY =====
function endDay(ok){
  STATE.dayActive=false;clearInterval(timeInterval);clearInterval(animInterval);stopBubbles();
  document.getElementById('task-panel').style.display='none';showIdle();
  const r=document.getElementById('day-result'),t=document.getElementById('result-title'),c=document.getElementById('result-content');r.style.display='flex';
  if(ok){t.textContent=STATE.day+'일차 업무 완료!';t.style.color='#FFD700';const tb=Math.floor(STATE.timeLeft*2),pb=STATE.customersFailed===0?100:0;STATE.gold+=tb+pb;
    c.innerHTML=`<div class="result-line">응대 고객: ${STATE.customersServed}명</div><div class="result-line">획득 골드: ${STATE.dailyGold}G</div><div class="result-line">획득 경험치: ${STATE.dailyExp}</div><div class="result-line bonus">시간 보너스: +${tb}G</div>${pb?'<div class="result-line bonus">퍼펙트 서비스 보너스: +100G!</div>':''}<div class="result-line" style="margin-top:14px;color:#FFD700;font-size:18px">총 골드: ${STATE.gold}G</div>`;}
  else{t.textContent='시간 초과...';t.style.color='#EF5350';const rm=STATE.queue.length+(STATE.currentCustomer?1:0),pn=rm*20;STATE.gold=Math.max(0,STATE.gold-pn);
    c.innerHTML=`<div class="result-line">응대 고객: ${STATE.customersServed}명</div><div class="result-line penalty">미처리 고객: ${rm}명</div><div class="result-line">획득 골드: ${STATE.dailyGold}G</div><div class="result-line penalty">야근 페널티: -${pn}G</div><div class="result-line" style="margin-top:14px;color:#FFD700;font-size:18px">총 골드: ${STATE.gold}G</div>`;}
}
function nextDay(){STATE.day++;document.getElementById('day-result').style.display='none';updateHUD();playDayIntro();}

// ===== UI =====
function updateHUD(){document.getElementById('hud-day').textContent=STATE.day+'일';document.getElementById('hud-level').textContent=STATE.level;document.getElementById('hud-gold').textContent=STATE.gold;document.getElementById('hud-exp').textContent=STATE.exp+'/'+STATE.expToNext;}
function updateTimeBar(){
  const bar=document.getElementById('time-bar'),lbl=document.getElementById('time-label');bar.style.width=STATE.timeLeft+'%';
  const h=9+Math.floor((100-STATE.timeLeft)*9/100),m=Math.floor(((100-STATE.timeLeft)*9/100-Math.floor((100-STATE.timeLeft)*9/100))*60);
  lbl.textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  const o=document.getElementById('sky-overlay');
  if(STATE.timeLeft>60)o.style.background='transparent';else if(STATE.timeLeft>30)o.style.background=`rgba(255,160,80,${(60-STATE.timeLeft)/60*0.12})`;else o.style.background=`rgba(60,20,100,${0.08+(30-STATE.timeLeft)/30*0.2})`;
  if(STATE.timeLeft<20)bar.style.background='linear-gradient(90deg,#EF5350,#FF7043)';else if(STATE.timeLeft<40)bar.style.background='linear-gradient(90deg,#FF7043,#FFB74D)';else bar.style.background='linear-gradient(90deg,#FFB347,#FFD700)';
}
function floatText(t,c,x,y){const el=document.createElement('div');el.className='float-text';el.textContent=t;el.style.color=c;el.style.left=x+'px';el.style.top=y+'px';document.getElementById('bank-interior').appendChild(el);setTimeout(()=>el.remove(),1500);}
function drawStar(id){const c=document.getElementById(id);if(!c)return;const x=c.getContext('2d');x.fillStyle='#FFE060';x.fillRect(5,0,2,12);x.fillRect(0,5,12,2);x.fillRect(2,2,2,2);x.fillRect(8,2,2,2);x.fillRect(2,8,2,2);x.fillRect(8,8,2,2);}
window.onload=function(){drawChibiTeller(document.getElementById('title-char1').getContext('2d'),'jungmin',4,0);drawChibiTeller(document.getElementById('title-char2').getContext('2d'),'junghyun',4,0);drawStar('star1');drawStar('star2');drawStar('star3');};
</script>
